name: Mirror legislative feeds

# Two sources, both public data, mirrored so the task pane can fetch
# same-origin from GitHub Pages:
#   1. Iowa GA RSS (their CORS header is broken)
#   2. Open States API for any state listed in states.json
#      (client-side use would expose the API key; mirroring keeps it a
#      repo secret and spends ~1 request per state per run)
on:
  schedule:
    - cron: "*/30 12-23 * * 1-5"
  workflow_dispatch:
    inputs:
      days:
        description: "created_since window in days"
        default: "21"
        required: false

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    env:
      KEY: ${{ secrets.OPENSTATES_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Iowa RSS
        run: |
          curl -sf "https://www.legis.iowa.gov/subscribe/rss/feeds/IowaBills.xml" -o feeds/IowaBills.xml || true
          curl -sf "https://www.legis.iowa.gov/subscribe/rss/feeds/Amendments.xml" -o feeds/Amendments.xml || true
      - name: Fetch Open States (per states.json)
        if: ${{ env.KEY != '' }}
        run: |
          since=$(date -u -d "${{ github.event.inputs.days || '21' }} days ago" +%Y-%m-%d)
          jq -r '.mirror[]' states.json | while read -r state; do
            slug=$(echo "$state" | tr '[:upper:] ' '[:lower:]-')
            curl -sf -G "https://v3.openstates.org/bills" \
              --data-urlencode "jurisdiction=$state" \
              --data-urlencode "created_since=$since" \
              --data-urlencode "per_page=20" \
              --data-urlencode "page=1" \
              -H "X-API-KEY: $KEY" \
              -o "feeds/openstates-$slug.json" || echo "openstates fetch failed for $state"
            sleep 2
          done
      - name: Commit if changed
        run: |
          git config user.name "feed-mirror"
          git config user.email "actions@github.com"
          git add feeds/
          git diff --cached --quiet && echo "No changes" || (git commit -m "Mirror legislative feeds" && git push)
